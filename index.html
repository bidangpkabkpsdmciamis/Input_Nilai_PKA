<html lang="id">
<head>
    <meta charset="UTF-8">

    <title>E-Penilaian PKA 2026 | BKPSDM Ciamis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8f5ff 0%, #f0ebfa 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* Elegant Header with Background Image */
        .hero-header {
            position: relative;
            border-radius: 48px;
            margin-bottom: 2.5rem;
            overflow: hidden;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .hero-header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,0,0,0.55) 0%, rgba(44, 32, 76, 0.7) 100%);
            z-index: 1;
            backdrop-filter: brightness(0.85);
        }

        .hero-bg {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .hero-header:hover .hero-bg {
            transform: scale(1.02);
        }

        .header-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem 2rem;
            z-index: 2;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            border-radius: 0 0 48px 48px;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(8px);
            padding: 0.5rem 1.2rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.25);
        }

        .logo-area img {
            height: 55px;
            width: auto;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .title-text {
            text-align: right;
        }

        .title-text h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            letter-spacing: -0.2px;
        }

        .title-text p {
            color: #ffecb3;
            font-weight: 500;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* Elegant Tabs - Modern Pill Design */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 2rem;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            padding: 0.7rem 1rem;
            border-radius: 80px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(108, 92, 231, 0.2);
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            color: #3c2c62;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        .tab-btn.active {
            background: linear-gradient(115deg, #6c5ce7, #a855f7);
            color: white;
            box-shadow: 0 6px 14px rgba(108, 92, 231, 0.35);
            transform: translateY(-1px);
        }

        .tab-btn:hover:not(.active) {
            background: #e9e2ff;
            color: #4a3a6a;
            transform: translateY(-1px);
        }

        /* Form Card - Glassmorphism Elegant */
        .form-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.25);
            transition: all 0.3s;
        }

        .form-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(125deg, #5f4bd8, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.8rem;
            border-left: 5px solid #f59e0b;
            padding-left: 1.2rem;
            letter-spacing: -0.3px;
        }

        /* Form Row */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
            background: #fefcf7;
            padding: 1rem 1rem 0.5rem;
            border-radius: 28px;
        }

        .input-group {
            flex: 1;
            min-width: 220px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #4d3a74;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        select, input:not([type="submit"]) {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #ffffff;
            border: 1.5px solid #e6deff;
            border-radius: 28px;
            color: #2d2a4a;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        select:focus, input:focus {
            border-color: #a56cf9;
            box-shadow: 0 0 0 3px rgba(165, 108, 249, 0.15);
        }

        .input-group input[readonly] {
            background: #f3efff;
            border-color: #e0d6ff;
            color: #6b5a8e;
            font-weight: 500;
        }

        /* Score Grid - Premium Cards */
        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.2rem;
            margin-top: 0.8rem;
        }

        .score-item {
            background: linear-gradient(115deg, #fffbf5, #fff9ef);
            border-radius: 28px;
            padding: 1rem 1.4rem;
            border: 1px solid #fae7c3;
            transition: all 0.25s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .score-item:hover {
            background: #ffffff;
            border-color: #f0c48b;
            transform: translateY(-3px);
            box-shadow: 0 12px 20px -12px rgba(245, 158, 11, 0.2);
        }

        .score-item label {
            font-weight: 600;
            display: block;
            margin-bottom: 10px;
            color: #b45f2b;
            font-size: 0.85rem;
        }

        .score-item input {
            background: white;
            border-radius: 32px;
            padding: 0.75rem 1rem;
            font-weight: 500;
            border-color: #ffdead;
        }

        /* Elegant Button */
        button.submit-btn {
            background: linear-gradient(105deg, #6c5ce7, #8b5cf6);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            margin-top: 2rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 6px 16px rgba(108, 92, 231, 0.3);
            width: 100%;
            max-width: 280px;
            letter-spacing: 0.5px;
        }

        button.submit-btn:hover {
            background: linear-gradient(105deg, #5b4bc7, #7c4ce6);
            transform: translateY(-2px);
            box-shadow: 0 12px 22px rgba(108, 92, 231, 0.4);
        }

        /* Toast Notification Premium */
        .toast-msg {
            position: fixed;
            bottom: 28px;
            right: 28px;
            background: #1f1b2e;
            color: #fef7e0;
            padding: 14px 26px;
            border-radius: 60px;
            font-weight: 500;
            backdrop-filter: blur(16px);
            border-left: 5px solid #fbbf24;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .form-card { padding: 1.2rem; }
            .score-grid { grid-template-columns: 1fr; }
            .tabs { border-radius: 40px; }
            .header-content { flex-direction: column; align-items: flex-start; padding: 1rem; }
            .title-text { text-align: left; width: 100%; }
            .title-text h1 { font-size: 1.2rem; }
            .hero-bg { height: 180px; }
            .logo-area img { height: 42px; }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #9b8bbf;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(255,255,240,0.6);
            backdrop-filter: blur(4px);
            padding: 0.8rem;
            border-radius: 40px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Extra details */
        .badge-role {
            display: inline-block;
            font-size: 0.7rem;
            background: #ede7ff;
            border-radius: 40px;
            padding: 2px 8px;
            margin-left: 8px;
            color: #6c5ce7;
        }
    </style>
</head>
<body>
<div class="app-container">

<script>

        { NDH: "1", Nama: "ADANG HARTONO, S.Sos., M.M." },

        { NDH: "14", Nama: "FENY SETIAPRIYANA, S.T., M.M." },
        { NDH: "15", Nama: "HERDIANA, S.E., M.Si." },
        { NDH: "16", Nama: "HERRY SOMANTRI, S.E., M.M." },
        { NDH: "17", Nama: "IRFAN HIELMI, S.STP., M.Si." },
        { NDH: "18", Nama: "MAR DIYANA YUSUF, S.E., M.M." },
        { NDH: "19", Nama: "MOCH. IVAN SAEFUL A., S.KM., M.Si." },
        { NDH: "20", Nama: "MOHAMAD FAIZAL RONALD, S.STP., M.M." },
        { NDH: "21", Nama: "OHIM ABDUROHIM, S.IP., M.Si." },
        { NDH: "22", Nama: "RADEN ARIS SUKMAYANA, S.STP., M.Si." },
        { NDH: "23", Nama: "RIFKI ARIFIN, S.H., M.M." },
        { NDH: "24", Nama: "RINI VALIANTI, S.T., M.T., M.Sc." },
        { NDH: "25", Nama: "SLAMET TAHER, S.ST., M.M." },
        { NDH: "26", Nama: "TEDY TRESADI, S.E., M.M." },
        { NDH: "27", Nama: "TIGIN ARY GINANJAR, S.STP., M.M." },
        { NDH: "28", Nama: "WIDIYA PRANATA, S.STP., M.M." },
        { NDH: "29", Nama: "drh. YANTI HERAYANI, M.M." },
        { NDH: "30", Nama: "YUDY HENDRIANA, S.IP." }
    ];

    // Konfigurasi Form dengan custom label (Penguji, Pendamping, dll)
    // Urutan sesuai permintaan: 
    // Form 1 -> "Penguji", Form 2 -> "Pendamping", Form 3 -> "Penguji", Form 4 -> "Penguji",
    // Form 5 -> "Pengampu", Form 6 -> "Penyelenggara", Form 7 -> "Mentor", Form 8 -> "Coach"
    const roleMapping = {
        1: "Penguji",
        2: "Pendamping",
        3: "Penguji",
        4: "Penguji",
        5: "Pengampu",
        6: "Penyelenggara",
        7: "Mentor",
        8: "Coach"
    };

    const formsConfig = [
        { id: 1, title: "Form 1 · Evaluasi Akademik", role: "Penguji", fields: [
            { label: "Penugasan Individu (Esai - Isu Aktual Agenda I,II,III)", col: "1C" },
            { label: "Quiz Smart Governance", col: "1D" },
            { label: "Penugasan Kelompok (Kualitas Substansi Bahan Tayang)", col: "1E" },
            { label: "Evaluasi Substansi", col: "1F" }
        ]},
        { id: 2, title: "Form 2 · Evaluasi Pembelajaran Studi Lapangan", role: "Pendamping", fields: [
            { label: "Kualitas Dokumentasi Lesson Learnt Studi Lapangan", col: "2C" },
            { label: "Kualitas Lesson Learnt Adopsi & Adaptasi", col: "2D" }
        ]},
        { id: 3, title: "Form 3 · Perencanaan Aksi Perubahan", role: "Penguji", fields: [
            { label: "Ketepatan Rencana Aksi Perubahan", col: "3C" },
            { label: "Terobosan Inovatif", col: "3D" },
            { label: "Tahapan Rencana Perubahan & Pengendalian Risiko", col: "3E" },
            { label: "Kejelasan Peta & Pemanfaatan Sumberdaya Organisasi", col: "3F" },
            { label: "Rencana Strategi Pengembangan Kompetensi", col: "3G" }
        ]},
        { id: 4, title: "Form 4 · Implementasi Aksi Perubahan", role: "Penguji", fields: [
            { label: "Capaian Hasil Perubahan terhadap Rencana", col: "4C" },
            { label: "Kepemimpinan Kinerja", col: "4D" },
            { label: "Kemanfaatan Aksi Perubahan", col: "4E" },
            { label: "Keberlanjutan Aksi Perubahan", col: "4F" },
            { label: "Pelaksanaan Strategi Pengembangan Kompetensi", col: "4G" },
            { label: "Keterkaitan Mata Pelatihan Pilihan dengan Aksi Perubahan", col: "4H" },
            { label: "Diseminasi dan Publikasi Aksi Perubahan", col: "4I" }
        ]},
        { id: 5, title: "Form 5 · Evaluasi Sikap (Pengampu Materi)", role: "Pengampu", fields: [
            { label: "Kerja sama dan Prakarsa (Inisiatif, Kerja sama)", col: "5C" },
            { label: "Kepemimpinan (Peran dalam Pengelolaan Tim)", col: "5D" },
            { label: "Kedisiplinan (Kehadiran, Penugasan, Kode Etik)", col: "5E" }
        ]},
        { id: 6, title: "Form 6 · Evaluasi Sikap (Penyelenggara)", role: "Penyelenggara", fields: [
            { label: "Kedisiplinan (Kepatuhan Kode Etik & Kesopanan)", col: "6C" }
        ]},
        { id: 7, title: "Form 7 · Evaluasi Sikap (Mentor)", role: "Mentor", fields: [
            { label: "Proses & Hasil Mentoring (Pemetaan Potensi Diri)", col: "7C" },
            { label: "Ketepatan Strategi Pengembangan Potensi Diri", col: "7D" },
            { label: "Capaian Hasil Pengembangan Potensi Diri", col: "7E" },
            { label: "Mentoring Pengembangan Potensi Diri", col: "7F" }
        ]},
        { id: 8, title: "Form 8 · Evaluasi Sikap (Coach)", role: "Coach", fields: [
            { label: "Penginformasian Hasil Pemetaan Sikap Perilaku", col: "8C" },
            { label: "Ketepatan Strategi Pengembangan Potensi Diri", col: "8D" },
            { label: "Capaian Hasil/Progres Pengembangan Potensi Diri", col: "8E" },
            { label: "Coaching Pengembangan Potensi Diri", col: "8F" }
        ]}
    ];

    let activeForm = 1;
    let isLoading = false;

    // GAS WEBAPP URL (tetap sama)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwVSYxgIyqmAoVILQ8yPFutuxIWquFH3mWYXRXgy-mcW75dUfNb9X-EdsmIkRbwrDZX/exec";

    function getNamaByNdh(ndhVal) {
        let found = pesertaData.find(p => p.NDH === ndhVal);
        return found ? found.Nama : "";
    }

    function renderTabs() {
        const tabsDiv = document.getElementById("tabContainer");
        tabsDiv.innerHTML = "";
        formsConfig.forEach(form => {
            const btn = document.createElement("button");
            const roleLabel = roleMapping[form.id] || "Penilai";
            // Tampilkan "Penguji", "Pendamping", dll sesuai mapping
            btn.innerText = `${roleLabel}`;
            btn.classList.add("tab-btn");
            if (activeForm === form.id) btn.classList.add("active");
            btn.setAttribute("data-formid", form.id);
            btn.onclick = () => {
                activeForm = form.id;
                renderTabs();
                renderForm();
            };
            tabsDiv.appendChild(btn);
        });
    }

    function renderForm() {
        const container = document.getElementById("formRenderArea");
        const config = formsConfig.find(f => f.id === activeForm);
        if (!config) return;
        
        const roleDisplay = roleMapping[config.id] || "Penilai";
        
        let html = `<div class="form-card">
                        <div class="form-title">
                            ${config.title} 
                            <span class="badge-role">👤 ${roleDisplay}</span>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>✍️ Nama ${roleDisplay}</label>
                                <input type="text" id="namaPenilai_${config.id}" placeholder="Masukkan nama ${roleDisplay}" value="">
                            </div>
                            <div class="input-group">
                                <label>📌 NDH Peserta</label>
                                <select id="ndhSelect_${config.id}" onchange="updateNama(${config.id})">
                                    <option value="">-- Pilih NDH --</option>`;
        
        pesertaData.forEach(p => {
            html += `<option value="${p.NDH}">${p.NDH} - ${p.Nama.substring(0, 48)}</option>`;
        });
        
        html += `     </select>
                            </div>
                            <div class="input-group">
                                <label>👤 Nama Peserta</label>
                                <input type="text" id="namaPeserta_${config.id}" readonly placeholder="Akan terisi otomatis">
                            </div>
                        </div>
                        <div class="score-grid">`;
        
        config.fields.forEach(field => {
            const fieldId = `field_${config.id}_${field.col.replace(/\./g, '_')}`;
            html += `<div class="score-item">
                        <label>⭐ ${field.label}</label>
                        <input type="number" step="0.01" min="0" max="100" placeholder="0 - 100" id="${fieldId}">
                    </div>`;
        });
        
        html += `</div>
                <div class="btn-wrapper">
                    <button class="submit-btn" onclick="submitFormData(${config.id})">
                        💾 Simpan Penilaian (${roleDisplay}) • Form ${config.id}
                    </button>
                </div>
            </div>`;
        
        container.innerHTML = html;
        
        // restore nama penilai
        const savedPenilai = localStorage.getItem(`namaPenilai_${activeForm}_role`);
        if (savedPenilai) {
            const penilaiInput = document.getElementById(`namaPenilai_${activeForm}`);
            if (penilaiInput) penilaiInput.value = savedPenilai;
        }
    }

    window.updateNama = function(formId) {
        const ndhSelect = document.getElementById(`ndhSelect_${formId}`);
        const selectedNdh = ndhSelect.value;
        const namaInput = document.getElementById(`namaPeserta_${formId}`);
        if (selectedNdh) {
            const nama = getNamaByNdh(selectedNdh);
            namaInput.value = nama;
        } else {
            namaInput.value = "";
        }
    };

    window.submitFormData = async function(formId) {
        if (isLoading) {
            showToast("⏳ Tunggu sebentar, proses sebelumnya masih berlangsung...");
            return;
        }

        const config = formsConfig.find(f => f.id === formId);
        if (!config) return;
        
        const roleLabel = roleMapping[formId] || "Penilai";
        const namaPenilaiElem = document.getElementById(`namaPenilai_${formId}`);
        const namaPenilai = namaPenilaiElem ? namaPenilaiElem.value.trim() : "";
        
        if (!namaPenilai) {
            alert(`❌ Silakan isi Nama ${roleLabel} terlebih dahulu!`);
            namaPenilaiElem.focus();
            return;
        }
        
        const ndhElem = document.getElementById(`ndhSelect_${formId}`);
        const ndh = ndhElem.value;
        const namaPesertaElem = document.getElementById(`namaPeserta_${formId}`);
        const namaPeserta = namaPesertaElem.value;
        
        if (!ndh || !namaPeserta) {
            alert("❌ Silakan pilih NDH terlebih dahulu!");
            ndhElem.focus();
            return;
        }

        // Kumpulkan nilai
        const payload = {
            formId: formId,
            role: roleLabel,
            namaPenilai: namaPenilai,
            ndh: ndh,
            namaPeserta: namaPeserta,
            scores: {},
            timestamp: new Date().toISOString()
        };
        
        for (let field of config.fields) {
            const inputId = `field_${formId}_${field.col.replace(/\./g, '_')}`;
            const inputElem = document.getElementById(inputId);
            let val = inputElem ? inputElem.value.trim() : "";
            
            if (val === "") {
                alert(`❌ Harap isi nilai untuk "${field.label}" terlebih dahulu.`);
                inputElem.focus();
                return;
            }
            
            const numVal = parseFloat(val);
            if (isNaN(numVal) || numVal < 0 || numVal > 100) {
                alert(`❌ Nilai untuk "${field.label}" harus angka antara 0-100.`);
                inputElem.focus();
                return;
            }
            payload.scores[field.col] = numVal;
        }

        isLoading = true;
        const submitBtn = document.querySelector(`.submit-btn`);
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '⏳ Menyimpan... <span class="loading"></span>';
        submitBtn.disabled = true;

        try {
            console.log("Mengirim data ke GAS:", payload);
            // mode no-cors untuk menghindari CORS di frontend, namun tetap mengirim
            await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            
            // Simpan nama penilai dengan role identifier
            localStorage.setItem(`namaPenilai_${formId}_role`, namaPenilai);
            
            showToast(`✅ Sukses! Form ${formId} (${roleLabel}) untuk ${namaPeserta} (NDH: ${ndh}) tersimpan di Google Sheet.`);
            
            // Optional: reset hanya nilai dan pilihan peserta, namun biarkan nama penilai tetap
            config.fields.forEach(field => {
                const inputId = `field_${formId}_${field.col.replace(/\./g, '_')}`;
                const inputElem = document.getElementById(inputId);
                if (inputElem) inputElem.value = "";
            });
            const ndhSelect = document.getElementById(`ndhSelect_${formId}`);
            if (ndhSelect) ndhSelect.value = "";
            const namaInput = document.getElementById(`namaPeserta_${formId}`);
            if (namaInput) namaInput.value = "";
            
        } catch (err) {
            console.error("Error detail:", err);
            showToast(`⚠️ Gagal menyimpan: ${err.message}. Periksa koneksi atau URL Web App.`);
        } finally {
            isLoading = false;
            if (submitBtn) {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        }
    };

    function showToast(message) {
        let toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = "0";
            toast.style.transform = "translateX(100%)";
            setTimeout(() => toast.remove(), 300);
        }, 3200);
    }

    // Inisialisasi
    renderTabs();
    renderForm();
</script>
</body>
</html>
