<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Sistem Penilaian Peserta | Elegant Theme</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f8f5ff 0%, #f0ebfa 100%);
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Elegant Header */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #6c5ce7, #a855f7, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .header p {
            color: #7c6b9e;
            margin-top: 0.5rem;
            font-weight: 450;
            font-size: 0.95rem;
        }

        /* Elegant Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 2rem;
            justify-content: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            padding: 0.5rem;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0.6rem 1.3rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #5a4a7a;
            letter-spacing: 0.2px;
        }

        .tab-btn.active {
            background: linear-gradient(105deg, #6c5ce7, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
        }

        .tab-btn:hover:not(.active) {
            background: #e9e2ff;
            color: #4a3a6a;
        }

        /* Form Card - Minimal & Elegan */
        .form-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 2rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 15px 40px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(108, 92, 231, 0.15);
            transition: all 0.3s;
        }

        .form-title {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(120deg, #6c5ce7, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1.8rem;
            border-left: 4px solid #f59e0b;
            padding-left: 1rem;
        }

        /* Form Row */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .input-group {
            flex: 1;
            min-width: 220px;
        }

        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #5a4a7a;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
        }

        select, input:not([type="submit"]) {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border: 1.5px solid #e2d9ff;
            border-radius: 20px;
            color: #2d2a4a;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .input-group input[readonly] {
            background: #f8f5ff;
            border-color: #e0d6ff;
            color: #6b5a8e;
        }

        /* Score Grid - Soft & Airy */
        .score-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .score-item {
            background: #fefaf5;
            border-radius: 24px;
            padding: 0.9rem 1.2rem;
            border: 1px solid #ffedd5;
            transition: all 0.2s;
        }

        .score-item:hover {
            background: #fffaf0;
            border-color: #fed7aa;
            transform: translateY(-2px);
        }

        .score-item label {
            font-weight: 500;
            display: block;
            margin-bottom: 8px;
            color: #b45f2b;
            font-size: 0.85rem;
        }

        .score-item input {
            background: white;
            border-radius: 28px;
            padding: 0.7rem 1rem;
            font-weight: 450;
            border-color: #ffe0b5;
        }

        /* Elegant Button */
        button.submit-btn {
            background: linear-gradient(105deg, #6c5ce7, #8b5cf6);
            border: none;
            padding: 0.85rem 2rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.95rem;
            color: white;
            margin-top: 1.8rem;
            cursor: pointer;
            transition: all 0.25s;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
            width: 100%;
            max-width: 260px;
        }

        button.submit-btn:hover {
            background: linear-gradient(105deg, #5b4bc7, #7c4ce6);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.25);
        }

        /* Toast Notification */
        .toast-msg {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #2d2a4e;
            color: #fef7e0;
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 500;
            backdrop-filter: blur(12px);
            border-left: 4px solid #fbbf24;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            font-size: 0.85rem;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 700px) {
            body { padding: 1rem; }
            .form-card { padding: 1.2rem; }
            .score-grid { grid-template-columns: 1fr; }
            .tabs { border-radius: 30px; }
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #9b8bbf;
            font-size: 0.75rem;
            font-weight: 450;
        }

        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Additional Elegance */
        .input-group select, .input-group input {
            font-weight: 450;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>✨ PENILAIAN PESERTA PKA 2026 KABUPATEN CIAMIS ✨</h1>
        <p>Evaluasi Akademik | Aksi Perubahan | Sikap & Perilaku</p>
    </div>

    <div class="tabs" id="tabContainer"></div>
    <div id="formRenderArea"></div>
    <footer>Setelah Submit Data tersimpan ke Google Sheet</footer>
</div>

<script>
    // DATA PESERTA
    const pesertaData = [
        { NDH: "1", Nama: "ADANG HARTONO, S.Sos., M.M." },
        { NDH: "2", Nama: "AGUS SETIADI, S.IP., M.M." },
        { NDH: "3", Nama: "ARIE SYAHRIAR MAULANA, S.T." },
        { NDH: "4", Nama: "ARIS GUNANTO, S.Pd., M.Pd." },
        { NDH: "5", Nama: "ASEP SULAEMAN, S.STP., M.M." },
        { NDH: "6", Nama: "BUDI YUDIA WAHYU, S.STP., M.Si." },
        { NDH: "7", Nama: "DADAN HARDIANTO, S.Hut., M.P." },
        { NDH: "8", Nama: "DEDEN NURHADANA, S.H., M.H." },
        { NDH: "9", Nama: "DIAN KUSDIANA, S.IP., M.M." },
        { NDH: "10", Nama: "DINI KUSLIANI, S.H., M.Si." },
        { NDH: "11", Nama: "EDIS HERDIS, S.Sos., M.M." },
        { NDH: "12", Nama: "ERWIN FIRWANSYAH, S.IP., M.Si." },
        { NDH: "13", Nama: "ERWIN MOCHAMMAD SYAM, S.IP." },
        { NDH: "14", Nama: "FENY SETIAPRIYANA, S.T., M.M." },
        { NDH: "15", Nama: "HERDIANA, S.E., M.Si." },
        { NDH: "16", Nama: "HERRY SOMANTRI, S.E., M.M." },
        { NDH: "17", Nama: "IRFAN HIELMI, S.STP., M.Si." },
        { NDH: "18", Nama: "MAR DIYANA YUSUF, S.E., M.M." },
        { NDH: "19", Nama: "MOCH. IVAN SAEFUL A., S.KM., M.Si." },
        { NDH: "20", Nama: "MOHAMAD FAIZAL RONALD, S.STP., M.M." },
        { NDH: "21", Nama: "OHIM ABDUROHIM, S.IP., M.Si." },
        { NDH: "22", Nama: "RADEN ARIS SUKMAYANA, S.STP., M.Si." },
        { NDH: "23", Nama: "RIFKI ARIFIN, S.H., M.M." },
        { NDH: "24", Nama: "RINI VALIANTI, S.T., M.T., M.Sc." },
        { NDH: "25", Nama: "SLAMET TAHER, S.ST., M.M." },
        { NDH: "26", Nama: "TEDY TRESADI, S.E., M.M." },
        { NDH: "27", Nama: "TIGIN ARY GINANJAR, S.STP., M.M." },
        { NDH: "28", Nama: "WIDIYA PRANATA, S.STP., M.M." },
        { NDH: "29", Nama: "drh. YANTI HERAYANI, M.M." },
        { NDH: "30", Nama: "YUDY HENDRIANA, S.IP." }
    ];

    // Konfigurasi Form (8 Form)
    const formsConfig = [
        { id: 1, title: "Form 1 · Evaluasi Akademik", fields: [
            { label: "Penugasan Individu (Esai - Isu Aktual Agenda I,II,III)", col: "1C" },
            { label: "Quiz Smart Governance", col: "1D" },
            { label: "Penugasan Kelompok (Kualitas Substansi Bahan Tayang)", col: "1E" },
            { label: "Evaluasi Substansi", col: "1F" }
        ]},
        { id: 2, title: "Form 2 · Evaluasi Pembelajaran Studi Lapangan", fields: [
            { label: "Kualitas Dokumentasi Lesson Learnt Studi Lapangan", col: "2C" },
            { label: "Kualitas Lesson Learnt Adopsi & Adaptasi", col: "2D" }
        ]},
        { id: 3, title: "Form 3 · Perencanaan Aksi Perubahan", fields: [
            { label: "Ketepatan Rencana Aksi Perubahan", col: "3C" },
            { label: "Terobosan Inovatif", col: "3D" },
            { label: "Tahapan Rencana Perubahan & Pengendalian Risiko", col: "3E" },
            { label: "Kejelasan Peta & Pemanfaatan Sumberdaya Organisasi", col: "3F" },
            { label: "Rencana Strategi Pengembangan Kompetensi", col: "3G" }
        ]},
        { id: 4, title: "Form 4 · Implementasi Aksi Perubahan", fields: [
            { label: "Capaian Hasil Perubahan terhadap Rencana", col: "4C" },
            { label: "Kepemimpinan Kinerja", col: "4D" },
            { label: "Kemanfaatan Aksi Perubahan", col: "4E" },
            { label: "Keberlanjutan Aksi Perubahan", col: "4F" },
            { label: "Pelaksanaan Strategi Pengembangan Kompetensi", col: "4G" },
            { label: "Keterkaitan Mata Pelatihan Pilihan dengan Aksi Perubahan", col: "4H" },
            { label: "Diseminasi dan Publikasi Aksi Perubahan", col: "4I" }
        ]},
        { id: 5, title: "Form 5 · Evaluasi Sikap (Pengampu Materi)", fields: [
            { label: "Kerja sama dan Prakarsa (Inisiatif, Kerja sama)", col: "5C" },
            { label: "Kepemimpinan (Peran dalam Pengelolaan Tim)", col: "5D" },
            { label: "Kedisiplinan (Kehadiran, Penugasan, Kode Etik)", col: "5E" }
        ]},
        { id: 6, title: "Form 6 · Evaluasi Sikap (Penyelenggara)", fields: [
            { label: "Kedisiplinan (Kepatuhan Kode Etik & Kesopanan)", col: "6C" }
        ]},
        { id: 7, title: "Form 7 · Evaluasi Sikap (Mentor)", fields: [
            { label: "Proses & Hasil Mentoring (Pemetaan Potensi Diri)", col: "7C" },
            { label: "Ketepatan Strategi Pengembangan Potensi Diri", col: "7D" },
            { label: "Capaian Hasil Pengembangan Potensi Diri", col: "7E" },
            { label: "Mentoring Pengembangan Potensi Diri", col: "7F" }
        ]},
        { id: 8, title: "Form 8 · Evaluasi Sikap (Coach)", fields: [
            { label: "Penginformasian Hasil Pemetaan Sikap Perilaku", col: "8C" },
            { label: "Ketepatan Strategi Pengembangan Potensi Diri", col: "8D" },
            { label: "Capaian Hasil/Progres Pengembangan Potensi Diri", col: "8E" },
            { label: "Coaching Pengembangan Potensi Diri", col: "8F" }
        ]}
    ];

    let activeForm = 1;
    let isLoading = false;

    // GANTI DENGAN URL WEB APP ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwVSYxgIyqmAoVILQ8yPFutuxIWquFH3mWYXRXgy-mcW75dUfNb9X-EdsmIkRbwrDZX/exec";

    function getNamaByNdh(ndhVal) {
        let found = pesertaData.find(p => p.NDH === ndhVal);
        return found ? found.Nama : "";
    }

    function renderTabs() {
        const tabsDiv = document.getElementById("tabContainer");
        tabsDiv.innerHTML = "";
        formsConfig.forEach(form => {
            const btn = document.createElement("button");
            btn.innerText = `Form ${form.id}`;
            btn.classList.add("tab-btn");
            if (activeForm === form.id) btn.classList.add("active");
            btn.onclick = () => {
                activeForm = form.id;
                renderTabs();
                renderForm();
            };
            tabsDiv.appendChild(btn);
        });
    }

    function renderForm() {
        const container = document.getElementById("formRenderArea");
        const config = formsConfig.find(f => f.id === activeForm);
        if (!config) return;

        let html = `<div class="form-card">
                        <div class="form-title">${config.title}</div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>👤 Nama Penilai</label>
                                <input type="text" id="namaPenilai_${config.id}" placeholder="Masukkan nama penilai" value="">
                            </div>
                            <div class="input-group">
                                <label>📌 NDH Peserta</label>
                                <select id="ndhSelect_${config.id}" onchange="updateNama(${config.id})">
                                    <option value="">-- Pilih NDH --</option>`;
        
        pesertaData.forEach(p => {
            html += `<option value="${p.NDH}">${p.NDH} - ${p.Nama.substring(0, 50)}</option>`;
        });
        
        html += `     </select>
                            </div>
                            <div class="input-group">
                                <label>👤 Nama Peserta</label>
                                <input type="text" id="namaPeserta_${config.id}" readonly placeholder="Akan terisi otomatis">
                            </div>
                        </div>
                        <div class="score-grid">`;
        
        config.fields.forEach(field => {
            const fieldId = `field_${config.id}_${field.col.replace(/\./g, '_')}`;
            html += `<div class="score-item">
                        <label>⭐ ${field.label}</label>
                        <input type="number" step="0.01" min="0" max="100" placeholder="Masukkan nilai 0-100" id="${fieldId}">
                    </div>`;
        });
        
        html += `</div>
                <div class="btn-wrapper">
                    <button class="submit-btn" onclick="submitFormData(${config.id})">
                        💾 Simpan Penilaian Form ${config.id}
                    </button>
                </div>
            </div>`;
        
        container.innerHTML = html;
        
        // Restore nama penilai jika ada di localStorage (opsional)
        const savedPenilai = localStorage.getItem(`namaPenilai_${activeForm}`);
        if (savedPenilai) {
            const penilaiInput = document.getElementById(`namaPenilai_${activeForm}`);
            if (penilaiInput) penilaiInput.value = savedPenilai;
        }
    }

    window.updateNama = function(formId) {
        const ndhSelect = document.getElementById(`ndhSelect_${formId}`);
        const selectedNdh = ndhSelect.value;
        const namaInput = document.getElementById(`namaPeserta_${formId}`);
        if (selectedNdh) {
            const nama = getNamaByNdh(selectedNdh);
            namaInput.value = nama;
        } else {
            namaInput.value = "";
        }
    };

    window.submitFormData = async function(formId) {
        if (isLoading) {
            showToast("⏳ Mohon tunggu, proses sebelumnya masih berjalan...");
            return;
        }

        const config = formsConfig.find(f => f.id === formId);
        if (!config) return;
        
        const namaPenilaiElem = document.getElementById(`namaPenilai_${formId}`);
        const namaPenilai = namaPenilaiElem ? namaPenilaiElem.value.trim() : "";
        
        if (!namaPenilai) {
            alert("❌ Silakan isi Nama Penilai terlebih dahulu!");
            namaPenilaiElem.focus();
            return;
        }
        
        const ndhElem = document.getElementById(`ndhSelect_${formId}`);
        const ndh = ndhElem.value;
        const namaPesertaElem = document.getElementById(`namaPeserta_${formId}`);
        const namaPeserta = namaPesertaElem.value;
        
        if (!ndh || !namaPeserta) {
            alert("❌ Silakan pilih NDH terlebih dahulu!");
            ndhElem.focus();
            return;
        }

        // Kumpulkan nilai
        const payload = {
            formId: formId,
            namaPenilai: namaPenilai,
            ndh: ndh,
            namaPeserta: namaPeserta,
            scores: {},
            timestamp: new Date().toISOString()
        };
        
        for (let field of config.fields) {
            const inputId = `field_${formId}_${field.col.replace(/\./g, '_')}`;
            const inputElem = document.getElementById(inputId);
            let val = inputElem ? inputElem.value.trim() : "";
            
            if (val === "") {
                alert(`❌ Harap isi nilai untuk "${field.label}" terlebih dahulu.`);
                inputElem.focus();
                return;
            }
            
            const numVal = parseFloat(val);
            if (isNaN(numVal) || numVal < 0 || numVal > 100) {
                alert(`❌ Nilai untuk "${field.label}" harus angka antara 0-100.`);
                inputElem.focus();
                return;
            }
            payload.scores[field.col] = numVal;
        }

        // Loading state
        isLoading = true;
        const submitBtn = document.querySelector(`.submit-btn`);
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '⏳ Menyimpan... <span class="loading"></span>';
        submitBtn.disabled = true;

        try {
            console.log("Mengirim data ke GAS:", payload);
            
            const response = await fetch(GAS_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(payload)
            });
            
            // Simpan nama penilai ke localStorage
            localStorage.setItem(`namaPenilai_${formId}`, namaPenilai);
            
            showToast(`✅ Berhasil! Form ${formId} untuk ${namaPeserta} (NDH: ${ndh}) telah tersimpan`);
            
            // Optional: reset nilai setelah sukses
            // resetForm(formId);
            
        } catch (err) {
            console.error("Error detail:", err);
            showToast(`⚠️ Gagal menyimpan: ${err.message}. Periksa koneksi atau URL Web App.`);
        } finally {
            isLoading = false;
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    };

    function resetForm(formId) {
        const config = formsConfig.find(f => f.id === formId);
        if (config) {
            config.fields.forEach(field => {
                const inputId = `field_${formId}_${field.col.replace(/\./g, '_')}`;
                const inputElem = document.getElementById(inputId);
                if (inputElem) inputElem.value = "";
            });
            const ndhSelect = document.getElementById(`ndhSelect_${formId}`);
            if (ndhSelect) ndhSelect.value = "";
            const namaInput = document.getElementById(`namaPeserta_${formId}`);
            if (namaInput) namaInput.value = "";
            // Nama penilai tidak direset agar tidak perlu mengetik ulang
        }
    }

    function showToast(message) {
        let toast = document.createElement("div");
        toast.className = "toast-msg";
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = "0";
            toast.style.transform = "translateX(100%)";
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Inisialisasi
    renderTabs();
    renderForm();
</script>
</body>
</html>
